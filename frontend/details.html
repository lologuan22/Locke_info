<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>宠物详情 - 洛克王国图鉴</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <link rel="stylesheet" href="./css/header-styles.css">
  <link rel="stylesheet" href="./css/auth-modal.css">
  <link rel="stylesheet" href="./css/user-panel.css">
  <link rel="stylesheet" href="./css/detail.css" />
</head>

<body>
  <div id="app" v-cloak>
    <common-header></common-header>

    <div class="container">
      <div v-if="loading" class="loading">加载中...</div>

      <template v-else-if="pet">
        <div class="info-card">
          <h2>{{ pet.name }} (ID: {{ pet.id }})</h2>
          <div class="pet-display-container">
            <div class="pet-photo">
              <img :src="'http://172.17.79.7:8080' + pet.imageUrl" :alt="pet.name" class="pet-img">
            </div>
            <div class="stat-bars">
              <div v-for="(label, index) in ['精力', '攻击', '防御', '魔攻', '魔抗', '速度']" :key="index" class="stat-item">
                <span class="stat-label">{{ label }}</span>
                <div class="bar-container">
                  <div class="bar-fill" :style="{ '--target-width': (pet.radarData[index] / 2) + '%' }"></div>
                </div>
                <span class="stat-value">{{ pet.radarData[index] }}</span>
              </div>
            </div>
          </div>
        </div>

        <div class="chart-card" id="radarChart" ref="radarChartRef"></div>

        <div class="description-section">
          <h3>宠物简介</h3>
          <p class="pet-intro">{{ pet.description || '暂无该宠物的背景描述。' }}</p>
        </div>

        <div class="suggestion-card">
          <h3>养成建议</h3>
          <div class="suggestion-content">
            <div class="suggestion-item">
              <strong>推荐性格：</strong>
              <span>{{ recommendedNature }}</span>
            </div>
            <div class="suggestion-item">
              <strong>定位分析：</strong>
              <span>{{ petRole }}</span>
            </div>
            <div class="suggestion-item">
              <strong>培养说明：</strong>
              <p>{{ dynamicAdvice }}</p>
            </div>
          </div>
        </div>
        <div class="skill-section">
          <h3>技能列表</h3>
          <table>
            <thead>
              <tr>
                <th>技能名</th>
                <th>属性</th>
                <th>威力</th>
                <th>PP</th>
                <th>描述</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="skill in pet.skills" :key="skill.id">
                <td>{{ skill.name }}</td>
                <td>{{ skill.type }}</td>
                <td>{{ skill.power }}</td>
                <td>{{ skill.pp }}</td>
                <td>{{ skill.effect }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </template>

      <div v-else class="loading">未找到该宠物信息</div>
    </div>
  </div>

</body>


<script type="module">
  import { usePetData } from './js/hooks/usePetData.js';
  import { usePetLogic } from './js/hooks/usePetLogic.js';
  import { PetChartController } from './js/utils/petChartController.js';
  import CommonHeader from './js/components/header/HeaderContainer.js';

  const chartCtrl = new PetChartController();
  const { fetchPetDetail } = usePetData();
  const { getRecommendedNature, getPetRole, getDynamicAdvice } = usePetLogic();

  const app = Vue.createApp({
    data() {
      return {
        pet: null,
        loading: true
      };
    },
    computed: {
      recommendedNature() { return getRecommendedNature(this.pet?.radarData); },
      petRole() { return getPetRole(this.pet?.radarData); },
      dynamicAdvice() { return getDynamicAdvice(this.pet?.radarData); }
    },
    methods: {
      async initPage() {
        try {
          this.pet = await fetchPetDetail();
          this.loading = false;

          if (this.pet.radarData) {
            this.$nextTick(() => {
              chartCtrl.render(this.$refs.radarChartRef, this.pet.radarData);
            });
          }
        } catch (err) {
          console.error('页面初始化失败:', err);
          this.loading = false;
        }
      }
    },
    mounted() {
      this.initPage();
      this.handleResize = () => chartCtrl.resize();
      window.addEventListener('resize', this.handleResize);
    },
    unmounted() {
      window.removeEventListener('resize', this.handleResize);
    }
  });

  app.component('common-header', CommonHeader);
  app.mount('#app');
</script>

</html>
