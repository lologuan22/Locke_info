<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>洛克王国wiki - 列表页</title>
    <link rel="stylesheet" href="./css/header-styles.css" />
    <link rel="stylesheet" href="./css/auth-modal.css">
    <link rel="stylesheet" href="./css/user-panel.css">
    <link rel="stylesheet" href="./css/home.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <div id="app" class="main" v-cloak>
        <common-header></common-header>

        <div class="map">
            <div class="map-header">
                <div class="search-bar">
                    <input type="text" v-model="filter.name" placeholder="搜索精灵名称" @keyup.enter="fetchList" />
                    <select v-model="filter.type">
                        <option value="">全部属性</option>
                        <option v-for="t in types" :key="t" :value="t">{{t}}</option>
                    </select>
                    <button @click="fetchList" class="btn-search">查询</button>
                </div>
                <a href="#" class="map-link">
                    <img id="map_in_bt" src="./img/imgmap.png" alt="地图入口" />
                </a>
            </div>

            <transition-group name="list" tag="div" class="scroll-container">


                <div v-for="pet in allPets" :key="pet.id" class="pet-card">
                    <div @click="goToDetail(pet.id)">
                        <img :src="'http://172.17.79.7:8080' + pet.imageUrl" :alt="pet.name">
                        <p>{{pet.name}}</p>
                        <small>{{pet.type1}}</small>
                    </div>
                    <button @click.stop="handleAddToBackpack(pet)" :disabled="pet.isAdding || pet.isOwned"
                        :class="['btn-add', { 'is-owned': pet.isOwned }]">
                        {{ pet.isAdding ? '处理中...' : (pet.isOwned ? '已收藏' : '加入背包') }}
                    </button>
                </div>
            </transition-group>
        </div>

        <div class="map backpack-map">
            <div class="map-header">
                <div class="search-bar">
                    <input type="text" v-model="backpackFilter.name" placeholder="搜索已收藏精灵名称"
                        @keyup.enter="fetchBackpack" />
                    <select v-model="backpackFilter.type">
                        <option value="">全部属性</option>
                        <option v-for="t in types" :key="t" :value="t">{{t}}</option>
                    </select>
                    <button @click="fetchBackpack" class="btn-search">查询</button>
                    <button @click="clearBackpack" class="btn-clear" v-if="backpackPets.length">清空收藏</button>
                </div>
                <a href="#" class="map-link">
                    <img id="map_in_bt" src="./img/mylike.png" alt="我的收藏" />
                </a>
            </div>

            <div v-if="!isLoggedIn" class="empty-msg">请先登录查看收藏</div>

            <transition-group name="list" tag="div" class="scroll-container">
                <div v-for="pet in backpackPets" :key="pet.id" class="pet-card">
                    <div @click="goToDetail(pet.id)">
                        <img :src="'http://172.17.79.7:8080' + pet.imageUrl" alt="">
                        <p>{{pet.name}}</p>
                    </div>
                    <button @click.stop="handleRemoveFromBackpack(pet.id)" class="btn-clear">移除</button>
                </div>
            </transition-group>
        </div>
    </div>

    <script type="module">
        import CommonHeader from './js/components/header/HeaderContainer.js';
        import {
            getPokemonList,
            getUserBackpack,
            removeFromBackpack,
            getCurrentUserInfo,
            addToBackpack
        } from './js/api/index.js';

        const app = Vue.createApp({
            data() {
                return {
                    types: ['水', '火', '草', '光', '翼', '电', '冰', '武', '土', '虫', '幽灵', '恶魔', '龙', '毒'],
                    allPets: [],
                    backpackPets: [],
                    isLoggedIn: false,
                    filter: {
                        name: '',
                        type: '',
                        current: 1,
                        size: 20
                    },
                    backpackFilter: {
                        name: '',
                        type: ''
                    }
                }
            },
            async created() {
                await this.checkLoginStatus();
                // 必须先获取背包，再获取列表，才能正确标记 isOwned
                await this.fetchBackpack();
                this.fetchList();
            },
            methods: {
                async checkLoginStatus() {
                    try {
                        const res = await getCurrentUserInfo();
                        this.isLoggedIn = (res.code === 200);
                    } catch (err) {
                        this.isLoggedIn = false;
                    }
                },

                async handleAddToBackpack(pet) {
                    if (!this.isLoggedIn) {
                        alert('请先登录再进行收藏');
                        return;
                    }
                    pet.isAdding = true; // 局部 Loading
                    try {
                        const res = await addToBackpack(pet.id);
                        if (res.code === 200) {
                            pet.isOwned = true; // 立即改变状态
                            await this.fetchBackpack(); // 同步下方背包列表
                        } else {
                            alert(res.message || '收藏失败');
                        }
                    } catch (err) {
                        console.error("收藏异常", err);
                    } finally {
                        pet.isAdding = false;
                    }
                },

                async handleRemoveFromBackpack(id) {
                    try {
                        const res = await removeFromBackpack(id);
                        if (res.code === 200) {
                            // 1. 更新背包列表
                            this.backpackPets = this.backpackPets.filter(p => p.id !== id);
                            // 2. 同时更新上方全部列表中的 isOwned 状态
                            const petInList = this.allPets.find(p => p.id === id);
                            if (petInList) petInList.isOwned = false;
                        }
                    } catch (err) {
                        alert("移除失败");
                    }
                },

                async fetchList() {
                    try {
                        const res = await getPokemonList(this.filter);
                        if (res.code === 200) {
                            const list = res.data.records || res.data;
                            // 映射数据，注入 isOwned 和 isAdding 属性
                            this.allPets = list.map(pet => ({
                                ...pet,
                                isOwned: this.backpackPets.some(b => b.id === pet.id),
                                isAdding: false
                            }));
                        }
                    } catch (err) {
                        console.error("加载列表失败", err);
                    }
                },

                async fetchBackpack() {
                    if (!this.isLoggedIn) return;
                    try {
                        const res = await getUserBackpack(this.backpackFilter);
                        if (res.code === 200) {
                            this.backpackPets = res.data.records || res.data;
                        }
                    } catch (err) {
                        console.warn("获取收藏失败", err);
                    }
                },

                goToDetail(id) {
                    window.location.href = `./details.html?id=${id}`;
                },

                // 清空背包：使用 Promise.all 并发处理
                async clearBackpack() {
                    if (!this.backpackPets.length) return;
                    if (!confirm('确定要移除当前列表下的所有收藏吗？')) return;

                    try {
                        const promises = this.backpackPets.map(pet => removeFromBackpack(pet.id));
                        await Promise.all(promises);

                        // 清空本地数据，避免刷新整个页面
                        this.backpackPets = [];
                        this.allPets.forEach(p => p.isOwned = false);

                        this.fetchBackpack(); // 最终同步一次后端状态
                    } catch (err) {
                        alert("清空部分失败，请重试");
                        this.fetchBackpack();
                    }
                }
            }
        });

        app.component('common-header', CommonHeader);
        app.mount('#app');
    </script>
</body>

</html>
